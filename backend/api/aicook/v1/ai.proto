syntax = "proto3";

package aicook.v1;

option go_package = "github.com/chengjiang/aicook/backend/api/aicook/v1;v1";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "api/aicook/v1/common.proto";

service AIService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionReply) {
    option (google.api.http) = {
      post: "/api/v1/ai/sessions"
      body: "*"
    };
  }

  rpc SendMessage(SendMessageRequest) returns (SendMessageReply) {
    option (google.api.http) = {
      post: "/api/v1/ai/sessions/{session_id}/messages"
      body: "*"
    };
  }
}

message CreateSessionRequest {
  string scene = 1;
  string title = 2;
  optional int64 recipe_id = 3;
  google.protobuf.Struct context = 4;
}

message CreateSessionReply {
  AISession session = 1;
}

message SendMessageRequest {
  int64 session_id = 1;
  string text = 2;
  string scene = 3;
  repeated Attachment attachments = 4;
  QuoteContext quote_context = 5;
}

message SendMessageReply {
  AISession session = 1;
  AIMessage user_message = 2;
  AIMessage assistant_message = 3;
  string reply_content = 4;
  string reply_mode = 5;
  repeated Source reply_sources = 6;
}
