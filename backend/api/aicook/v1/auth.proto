syntax = "proto3";

package aicook.v1;

option go_package = "github.com/chengjiang/aicook/backend/api/aicook/v1;v1";

import "google/api/annotations.proto";
import "api/aicook/v1/common.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (AuthReply) {
    option (google.api.http) = {
      post: "/api/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (AuthReply) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }

  rpc GetMe(GetMeRequest) returns (GetMeReply) {
    option (google.api.http) = {
      get: "/api/v1/auth/me"
    };
  }

  rpc ListMyHouseholds(ListMyHouseholdsRequest) returns (ListMyHouseholdsReply) {
    option (google.api.http) = {
      get: "/api/v1/auth/households"
    };
  }

  rpc SwitchHousehold(SwitchHouseholdRequest) returns (AuthReply) {
    option (google.api.http) = {
      post: "/api/v1/auth/switch-household"
      body: "*"
    };
  }
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string display_name = 3;
  string phone = 4;
  string email = 5;
  string household_name = 6;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message GetMeRequest {}

message ListMyHouseholdsRequest {}

message SwitchHouseholdRequest {
  int64 household_id = 1;
}

message AuthReply {
  string token = 1;
  UserProfile user = 2;
  HouseholdSummary current_household = 3;
  repeated HouseholdSummary households = 4;
}

message GetMeReply {
  UserProfile user = 1;
  HouseholdSummary current_household = 2;
  repeated HouseholdSummary households = 3;
}

message ListMyHouseholdsReply {
  repeated HouseholdSummary households = 1;
}
