syntax = "proto3";

package aicook.v1;

option go_package = "github.com/chengjiang/aicook/backend/api/aicook/v1;v1";

import "google/api/annotations.proto";
import "api/aicook/v1/common.proto";

service HouseholdService {
  rpc CreateHousehold(CreateHouseholdRequest) returns (CreateHouseholdReply) {
    option (google.api.http) = {
      post: "/api/v1/households"
      body: "*"
    };
  }

  rpc CreateShareCode(CreateShareCodeRequest) returns (CreateShareCodeReply) {
    option (google.api.http) = {
      post: "/api/v1/households/share-code"
      body: "*"
    };
  }

  rpc GetKitchenByShareCode(GetKitchenByShareCodeRequest) returns (GetKitchenByShareCodeReply) {
    option (google.api.http) = {
      get: "/api/v1/households/share/{share_code}"
    };
  }

  rpc ImportSharedRecipes(ImportSharedRecipesRequest) returns (ImportSharedRecipesReply) {
    option (google.api.http) = {
      post: "/api/v1/households/share/{share_code}:import"
      body: "*"
    };
  }

  rpc ListKitchenTags(ListKitchenTagsRequest) returns (ListKitchenTagsReply) {
    option (google.api.http) = {
      get: "/api/v1/kitchen-tags"
    };
  }

  rpc CreateKitchenTag(CreateKitchenTagRequest) returns (CreateKitchenTagReply) {
    option (google.api.http) = {
      post: "/api/v1/kitchen-tags"
      body: "*"
    };
  }

  rpc UpdateKitchenTag(UpdateKitchenTagRequest) returns (UpdateKitchenTagReply) {
    option (google.api.http) = {
      patch: "/api/v1/kitchen-tags/{id}"
      body: "*"
    };
  }

  rpc DeleteKitchenTag(DeleteKitchenTagRequest) returns (DeleteKitchenTagReply) {
    option (google.api.http) = {
      delete: "/api/v1/kitchen-tags/{id}"
    };
  }

  rpc GetHouseholdPreferences(GetHouseholdPreferencesRequest) returns (GetHouseholdPreferencesReply) {
    option (google.api.http) = {
      get: "/api/v1/households/current/preferences"
    };
  }

  rpc UpdateHouseholdPreferences(UpdateHouseholdPreferencesRequest) returns (UpdateHouseholdPreferencesReply) {
    option (google.api.http) = {
      put: "/api/v1/households/current/preferences"
      body: "*"
    };
  }
}

message CreateHouseholdRequest {
  string name = 1;
}

message CreateHouseholdReply {
  HouseholdSummary household = 1;
}

message CreateShareCodeRequest {}

message CreateShareCodeReply {
  HouseholdSummary household = 1;
}

message GetKitchenByShareCodeRequest {
  string share_code = 1;
}

message SharedRecipePreview {
  Recipe recipe = 1;
}

message GetKitchenByShareCodeReply {
  HouseholdSummary household = 1;
  repeated SharedRecipePreview recipes = 2;
}

message ImportSharedRecipesRequest {
  string share_code = 1;
  repeated int64 recipe_ids = 2;
  optional int64 kitchen_tag_id = 3;
  string kitchen_tag_name = 4;
}

message ImportSharedRecipesReply {
  repeated Recipe recipes = 1;
  optional KitchenTag kitchen_tag = 2;
}

message ListKitchenTagsRequest {}

message ListKitchenTagsReply {
  repeated KitchenTag tags = 1;
}

message CreateKitchenTagRequest {
  string name = 1;
  string icon = 2;
  string color = 3;
}

message CreateKitchenTagReply {
  KitchenTag tag = 1;
}

message UpdateKitchenTagRequest {
  int64 id = 1;
  string name = 2;
  string icon = 3;
  string color = 4;
}

message UpdateKitchenTagReply {
  KitchenTag tag = 1;
}

message DeleteKitchenTagRequest {
  int64 id = 1;
}

message DeleteKitchenTagReply {}

// HouseholdPreferences 家庭口味与饮食偏好；推荐算法直接使用这些标签做匹配。
message HouseholdPreferences {
  // 偏爱的口味，如 "麻辣" / "清淡" / "甜"。
  repeated string flavor = 1;
  // 喜好的菜系或场景，如 "家常菜" / "下饭菜" / "快手菜"。
  repeated string scenarios = 2;
  // 忌口或不能吃的食材，如 "香菜" / "海鲜" / "牛肉"。
  repeated string restrictions = 3;
  // 偏好难度，1-5，0 表示无要求。
  int32 max_difficulty = 4;
  // 偏好用时，分钟，0 表示无要求。
  int32 max_minutes = 5;
}

message GetHouseholdPreferencesRequest {}

message GetHouseholdPreferencesReply {
  HouseholdPreferences preferences = 1;
}

message UpdateHouseholdPreferencesRequest {
  HouseholdPreferences preferences = 1;
}

message UpdateHouseholdPreferencesReply {
  HouseholdPreferences preferences = 1;
}
