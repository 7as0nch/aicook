syntax = "proto3";

package aicook.v1;

option go_package = "github.com/chengjiang/aicook/backend/api/aicook/v1;v1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "api/aicook/v1/common.proto";

service KnowledgeService {
  rpc CreateKnowledgeBase(CreateKnowledgeBaseRequest) returns (CreateKnowledgeBaseReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge-bases"
      body: "*"
    };
  }

  rpc ListKnowledgeBases(ListKnowledgeBasesRequest) returns (ListKnowledgeBasesReply) {
    option (google.api.http) = {
      get: "/api/v1/knowledge-bases"
    };
  }

  rpc CreateKnowledgeDocument(CreateKnowledgeDocumentRequest) returns (CreateKnowledgeDocumentReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge-bases/{knowledge_base_id}/documents"
      body: "*"
    };
  }

  rpc ListKnowledgeDocuments(ListKnowledgeDocumentsRequest) returns (ListKnowledgeDocumentsReply) {
    option (google.api.http) = {
      get: "/api/v1/knowledge-bases/{knowledge_base_id}/documents"
    };
  }

  rpc ReindexKnowledgeBase(ReindexKnowledgeBaseRequest) returns (ReindexKnowledgeBaseReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge-bases/{knowledge_base_id}/reindex"
      body: "*"
    };
  }

  rpc QueryKnowledgeBase(QueryKnowledgeBaseRequest) returns (QueryKnowledgeBaseReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge-bases/{knowledge_base_id}/query"
      body: "*"
    };
  }

  rpc ListHouseholdAIMemories(ListHouseholdAIMemoriesRequest) returns (ListHouseholdAIMemoriesReply) {
    option (google.api.http) = {
      get: "/api/v1/household-ai-memories"
    };
  }

  rpc CreateHouseholdAIMemory(CreateHouseholdAIMemoryRequest) returns (CreateHouseholdAIMemoryReply) {
    option (google.api.http) = {
      post: "/api/v1/household-ai-memories"
      body: "*"
    };
  }

  // 查询某次上传 media_asset 对应的知识入库（chunk 化、索引化）状态。
  // 用于厨艺 AI 聊天附件入库进度轮询。
  rpc GetKnowledgeIngestStatus(GetKnowledgeIngestStatusRequest) returns (GetKnowledgeIngestStatusReply) {
    option (google.api.http) = {
      get: "/api/v1/knowledge/ingest-status"
    };
  }

  // 失败/部分失败时手工触发某文档的重新入库。
  rpc RetryKnowledgeDocument(RetryKnowledgeDocumentRequest) returns (RetryKnowledgeDocumentReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge/documents/{document_id}/retry"
      body: "*"
    };
  }
}

message CreateKnowledgeBaseRequest {
  string name = 1;
  string description = 2;
}

message CreateKnowledgeBaseReply {
  KnowledgeBase base = 1;
}

message ListKnowledgeBasesRequest {}

message ListKnowledgeBasesReply {
  repeated KnowledgeBase bases = 1;
}

message CreateKnowledgeDocumentRequest {
  int64 knowledge_base_id = 1;
  int64 media_asset_id = 2;
  string title = 3;
}

message CreateKnowledgeDocumentReply {
  KnowledgeDocument document = 1;
}

message ListKnowledgeDocumentsRequest {
  int64 knowledge_base_id = 1;
}

message ListKnowledgeDocumentsReply {
  repeated KnowledgeDocument documents = 1;
}

message ReindexKnowledgeBaseRequest {
  int64 knowledge_base_id = 1;
}

message ReindexKnowledgeBaseReply {
  string status = 1;
}

message QueryKnowledgeBaseRequest {
  int64 knowledge_base_id = 1;
  string question = 2;
}

message QueryKnowledgeBaseReply {
  string answer = 1;
  repeated Source sources = 2;
  string mode = 3;
}

message ListHouseholdAIMemoriesRequest {
  // 默认服务端按 80 条处理；0 表示使用默认上限。
  int32 limit = 1;
}

message ListHouseholdAIMemoriesReply {
  repeated HouseholdAIMemory memories = 1;
}

message HouseholdAIMemory {
  int64 id = 1;
  string scope = 2;
  string content = 3;
  string source = 4;
  optional int64 user_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateHouseholdAIMemoryRequest {
  string content = 1;
  string scope = 2;
}

message CreateHouseholdAIMemoryReply {
  bool ok = 1;
}

message GetKnowledgeIngestStatusRequest {
  // 上传图片/文件返回的 media asset id
  int64 asset_id = 1;
}

// 入库状态视图，对齐 biz/knowledge.go KnowledgeIngestStatusView。
// pending=true 表示文档尚未创建（排队中）；settled=true 表示无需继续轮询。
message GetKnowledgeIngestStatusReply {
  bool pending = 1;
  bool settled = 2;
  string status = 3;
  string processing_stage = 4;
  // 人类可读的进度文案（如「正在切分文本…」）
  string stage_label = 5;
  // 用 string 而不是 int64，避免前端 JSON 大数精度丢失（与原 JSON 协议对齐）
  string document_id = 6;
  string media_asset_id = 7;
  string title = 8;
  int32 chunk_count = 9;
  bool retryable = 10;
  bool partial = 11;
  string failure_reason = 12;
  string summary = 13;
  string last_error_kind = 14;
  string last_error_detail = 15;
}

message RetryKnowledgeDocumentRequest {
  int64 document_id = 1;
  // 可选：触发该文档原属的 AI session 上下文（用于通知绑定）
  optional int64 session_id = 2;
}

message RetryKnowledgeDocumentReply {
  bool accepted = 1;
  // 用 string ID 避免前端大数精度丢失（与原 JSON 协议对齐）
  string document_id = 2;
  string media_asset_id = 3;
  string title = 4;
  string processing_stage = 5;
  string status = 6;
  string stage_label = 7;
}
