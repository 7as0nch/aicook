syntax = "proto3";

package aicook.v1;

option go_package = "github.com/chengjiang/aicook/backend/api/aicook/v1;v1";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "api/aicook/v1/common.proto";

// 注意：路由注册顺序很关键 —— 固定路径（today/favorites/:draft）必须放在 {id} 通配之前，
// 否则 kratos 路由会把 today / favorites 当成 id 去解析，触发 400 invalid syntax。
// recipe_http.pb.go 中 RegisterRecipeServiceHTTPServer 已手动按此顺序排好，regen 时务必检查。
service RecipeService {
  rpc ListRecipes(ListRecipesRequest) returns (ListRecipesReply) {
    option (google.api.http) = {
      get: "/api/v1/recipes"
    };
  }

  // ListTodayRecipes 返回小程序首页"今日推荐"列表，按偏好/计划/历史等信号综合排序。
  rpc ListTodayRecipes(ListTodayRecipesRequest) returns (ListTodayRecipesReply) {
    option (google.api.http) = {
      get: "/api/v1/recipes/today"
    };
  }

  rpc ListMyFavorites(ListMyFavoritesRequest) returns (ListMyFavoritesReply) {
    option (google.api.http) = {
      get: "/api/v1/recipes/favorites"
    };
  }

  rpc CreateRecipeDraft(CreateRecipeDraftRequest) returns (CreateRecipeDraftReply) {
    option (google.api.http) = {
      post: "/api/v1/recipes:draft"
      body: "*"
    };
  }

  rpc AddRecipeFavorite(AddRecipeFavoriteRequest) returns (AddRecipeFavoriteReply) {
    option (google.api.http) = {
      post: "/api/v1/recipes/{recipe_id}/favorite"
      body: "*"
    };
  }

  rpc RemoveRecipeFavorite(RemoveRecipeFavoriteRequest) returns (RemoveRecipeFavoriteReply) {
    option (google.api.http) = {
      delete: "/api/v1/recipes/{recipe_id}/favorite"
    };
  }

  rpc GetRecipeDetail(GetRecipeDetailRequest) returns (GetRecipeDetailReply) {
    option (google.api.http) = {
      get: "/api/v1/recipes/{id}"
    };
  }

  rpc UpdateRecipe(UpdateRecipeRequest) returns (UpdateRecipeReply) {
    option (google.api.http) = {
      put: "/api/v1/recipes/{id}"
      body: "*"
    };
  }

  rpc DeleteRecipe(DeleteRecipeRequest) returns (DeleteRecipeReply) {
    option (google.api.http) = {
      delete: "/api/v1/recipes/{id}"
    };
  }
}

message ListRecipesRequest {
  int32 limit = 1;
  string keyword = 2;
  string kitchen_tag = 3;
  bool exclude_draft = 4;
  // Optional: "draft" | "published". When set, filters by status; takes precedence over exclude_draft.
  string recipe_status = 5;
}

message ListRecipesReply {
  repeated Recipe recipes = 1;
}

message GetRecipeDetailRequest {
  int64 id = 1;
}

message GetRecipeDetailReply {
  RecipeDetail detail = 1;
}

message CreateRecipeDraftIngredient {
  string group_name = 1;
  string name = 2;
  string amount_text = 3;
  string preparation = 4;
  string remark = 5;
}

message CreateRecipeDraftStep {
  string title = 1;
  string description = 2;
  string step_type = 3;
  bool need_timer = 4;
  int32 timer_seconds = 5;
  string timer_animation = 6;
  string end_condition = 7;
  string heat_level = 8;
  string safety_tips = 9;
  string ai_hint = 10;
  string media_url = 11;
  repeated string media_urls = 12;
}

message CreateRecipeDraftRequest {
  string title = 1;
  string summary = 2;
  string cover_image_url = 3;
  string category = 4;
  int32 total_minutes = 5;
  int32 difficulty = 6;
  repeated string tools = 7;
  repeated string scenario_tags = 8;
  repeated string flavor_tags = 9;
  repeated CreateRecipeDraftIngredient ingredients = 10;
  repeated CreateRecipeDraftStep steps = 11;
  repeated string gallery_image_urls = 12;
}

message CreateRecipeDraftReply {
  RecipeDetail detail = 1;
}

message UpdateRecipeRequest {
  int64 id = 1;
  string title = 2;
  string summary = 3;
  string cover_image_url = 4;
  repeated string gallery_image_urls = 5;
  string category = 6;
  string status = 7;
  int32 total_minutes = 8;
  int32 difficulty = 9;
  repeated string tools = 10;
  repeated string scenario_tags = 11;
  repeated string flavor_tags = 12;
  google.protobuf.Struct metadata = 13;
  repeated CreateRecipeDraftIngredient ingredients = 14;
  repeated CreateRecipeDraftStep steps = 15;
}

message UpdateRecipeReply {
  RecipeDetail detail = 1;
}

message DeleteRecipeRequest {
  int64 id = 1;
}

message DeleteRecipeReply {
  bool ok = 1;
}

// --- Today recipes (首页推荐) ---

message TodayRecipeReason {
  // kind 例如 "meal_plan" / "preference" / "popular" / "recently_cooked"，前端可用于展示徽章。
  string kind = 1;
  string label = 2;
}

message TodayRecipe {
  Recipe recipe = 1;
  double score = 2;
  // reasons 为该菜谱被推荐的多条命中理由，按权重降序排列。
  repeated TodayRecipeReason reasons = 3;
}

message ListTodayRecipesRequest {
  int32 limit = 1;
}

message ListTodayRecipesReply {
  repeated TodayRecipe items = 1;
}

// --- Favorites ---

message AddRecipeFavoriteRequest {
  int64 recipe_id = 1;
}

message AddRecipeFavoriteReply {
  Recipe recipe = 1;
  bool favored = 2;
}

message RemoveRecipeFavoriteRequest {
  int64 recipe_id = 1;
}

message RemoveRecipeFavoriteReply {
  bool ok = 1;
}

message ListMyFavoritesRequest {
  int32 limit = 1;
  // 上一页最后一项 id，下一页从此向前翻
  int64 before_id = 2;
}

message ListMyFavoritesReply {
  repeated Recipe recipes = 1;
  int64 total = 2;
}
