syntax = "proto3";

package aicook.conf;

option go_package = "github.com/chengjiang/aicook/backend/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  OSS oss = 3;
  reserved 4;  // 原 Inference（已删除：OCR 改 vision_model，ASR 改 mimo-v2.5-asr）
  reserved "inference";
  AI ai = 5;
  Auth auth = 6;
  Log log = 7;
  Wechat wechat = 8;
}

message Wechat {
  // 微信小程序 AppID（管理后台获取）
  string appid = 1;
  // 微信小程序 AppSecret（管理后台获取）。生产环境强烈建议从安全的密钥管理服务注入。
  string secret = 2;
}

message Auth {
  string jwt_secret = 1;                   // JWT HMAC 签名密钥；为空时回退到本地开发默认值
  google.protobuf.Duration token_ttl = 2;  // token 有效期；<=0 时回退为 24h
}

message Log {
  string path = 1;      // 日志目录，为空时默认 ./logs
  string filename = 2;  // 日志文件名，为空时默认 aicook.log
  string level = 3;     // 日志级别 debug/info/warn/error，为空时默认 info
}

message Server {
  string name = 1;
  HTTP http = 2;
  GRPC grpc = 3;
}

message HTTP {
  string network = 1;
  string addr = 2;
  google.protobuf.Duration timeout = 3;
}

message GRPC {
  string network = 1;
  string addr = 2;
  google.protobuf.Duration timeout = 3;
}

message Data {
  PGDatabase pg_database = 1;
  Redis redis = 2;
}

message PGDatabase {
  string host = 1;
  int32 port = 2;
  string user = 3;
  string password = 4;
  string dbname = 5;
  string sslmode = 6;
  string schema = 7;
  bool auto_migrate = 8;
}

message Redis {
  string addr = 1;
  google.protobuf.Duration read_timeout = 2;
  google.protobuf.Duration write_timeout = 3;
  string password = 4;
}

message OSS {
  string endpoint = 1;
  string public_endpoint = 2;
  string access_key = 3;
  string secret_key = 4;
  bool use_ssl = 5;
  string media_bucket = 6;
  string knowledge_bucket = 7;
}

message AI {
  string mode = 1;
  string provider = 2;
  string base_url = 3;
  string api_key = 4;
  string chat_model = 5;
  string vision_model = 6;
  string embedding_model = 7;
  // LLM 单次请求超时（菜谱生成等长输出场景需要较大值），缺省 300s
  google.protobuf.Duration request_timeout = 8;
  // 语音识别模型（小米 MiMo ASR），缺省 mimo-v2.5-asr
  string asr_model = 9;
}
