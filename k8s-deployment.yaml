apiVersion: v1
kind: Namespace
metadata:
  name: aicook
---
apiVersion: v1
kind: Secret
metadata:
  name: aicook-secrets
  namespace: aicook
type: Opaque
stringData:
  pg-password: "pgcj123456"
  minio-root-user: "7ns5yiCMFgN5rdZbkJnW"
  minio-root-password: "4GV4kNFqonmgFNlTkLMfK6R7ChCP4a63TFMIqHIx"
  openai-api-key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: aicook
data:
  config.yaml: |
    server:
      name: aicook-backend
      http:
        addr: 0.0.0.0:8000
        timeout: 30s
    data:
      pg_database:
        host: sshjd.aihelper.chat
        port: 30532
        user: pgadmin
        password: "pgcj123456"
        dbname: pgdb
        sslmode: disable
        schema: aicook
        auto_migrate: false
    oss:
      endpoint: minio.aicook.svc.cluster.local:9000
      access_key: "7ns5yiCMFgN5rdZbkJnW"
      secret_key: "4GV4kNFqonmgFNlTkLMfK6R7ChCP4a63TFMIqHIx"
      use_ssl: false
      media_bucket: aicook-media
      knowledge_bucket: aicook-kb
    inference:
      endpoint: http://inference-service.aicook.svc.cluster.local:8088
      timeout: 30s
    ai:
      mode: adk
      provider: openai-compatible
      base_url: ""
      api_key: ""
      chat_model: ""
      vision_model: ""
      embedding_model: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: aicook
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: aicook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-02-07T23-21-09Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aicook-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aicook-secrets
                  key: minio-root-password
          ports:
            - containerPort: 9000
            - containerPort: 9001
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: aicook
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: aicook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference-service
          image: 7as0nch/aicook-inference:latest
          env:
            - name: AICOOK_ALLOW_DUMMY
              value: "true"
            - name: FUNASR_DEVICE
              value: "cpu"
            - name: PADDLEOCR_LANG
              value: "ch"
          ports:
            - containerPort: 8088
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: aicook
spec:
  selector:
    app: inference-service
  ports:
    - port: 8088
      targetPort: 8088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aicook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 7as0nch/aicook-backend:latest
          env:
            - name: AICOOK_CONFIG
              value: /data/conf/config.yaml
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          volumeMounts:
            - name: config
              mountPath: /data/conf
      volumes:
        - name: config
          configMap:
            name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aicook
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aicook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 7as0nch/aicook-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: aicook
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aicook-ingress
  namespace: aicook
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: aicook.aihelper.chat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.aicook.aihelper.chat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
